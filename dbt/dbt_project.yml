name: running_signals
version: "1.0.0"
config-version: 2

profile: running_signals

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

vars:
  analytics_time_zone: "Europe/Amsterdam"

models:
  running_signals:
    silver:
      +materialized: view
      +schema: "{{ env_var('DATABRICKS_SILVER_SCHEMA', 'silver') }}"
    gold:
      +materialized: table
      +schema: "{{ env_var('DATABRICKS_GOLD_SCHEMA', 'gold') }}"

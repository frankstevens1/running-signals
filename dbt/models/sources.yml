version: 2

sources:
  - name: garmin_raw
    catalog: "{{ env_var('DATABRICKS_CATALOG') }}"
    schema: bronze
    tables:
      - name: garmin_activities_raw
        description: Raw Garmin activity summary payloads.
        columns:
          - name: activity_id
            tests:
              - not_null
              - unique

      - name: garmin_activity_details_raw
        description: Raw Garmin activity detail payloads including laps, samples, heart-rate data, Garmin Recovery HR, and extended metrics where available.
        columns:
          - name: activity_id
            tests:
              - not_null

      - name: garmin_fit_sessions
        description: Bronze Garmin FIT session messages with one row per running activity.
        columns:
          - name: run_id
            tests:
              - not_null
              - unique
          - name: garmin_activity_id
            tests:
              - not_null
          - name: run_date
            tests:
              - not_null

      - name: garmin_fit_events
        description: Bronze Garmin FIT event messages filtered to timer and recovery-heart-rate events.
        columns:
          - name: run_id
            tests:
              - not_null
          - name: run_date
            tests:
              - not_null

      - name: garmin_fit_records
        description: Bronze Garmin FIT record messages with high-frequency activity telemetry.
        columns:
          - name: run_id
            tests:
              - not_null
          - name: timestamp
            tests:
              - not_null
          - name: run_date
            tests:
              - not_null

version: 2

models:
  - name: silver_dates
    description: Completed calendar-day spine from the first observed Garmin date through the latest completed day.
    columns:
      - name: calendar_date
        description: Calendar date grain for daily analytical rollups.
        tests:
          - not_null
          - unique
      - name: week_start_date
        tests:
          - not_null
      - name: month_start_date
        tests:
          - not_null
      - name: year_start_date
        tests:
          - not_null

  - name: silver_runs
    description: Canonical session-level running activity model derived from bronze Garmin FIT session messages and record coverage.
    columns:
      - name: run_id
        tests:
          - not_null
          - unique
      - name: activity_id
        tests:
          - not_null
      - name: activity_date
        tests:
          - not_null

  - name: silver_run_records
    description: Cleaned per-record Garmin FIT telemetry with timestamps, elapsed seconds, pace, heart rate, cadence, altitude, coordinates, and H3 cells.
    tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns: ["run_id", "record_timestamp"]
    columns:
      - name: run_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_runs')
                field: run_id
      - name: record_timestamp
        tests:
          - not_null
      - name: elapsed_seconds
        tests:
          - not_null
      - name: record_index
        tests:
          - not_null

  - name: silver_health_days
    description: Canonical daily Garmin health context derived from raw Garmin Connect API JSON payloads.
    columns:
      - name: calendar_date
        description: Garmin health calendar date.
        tests:
          - not_null
          - unique

  - name: silver_weeks
    description: Compatibility completed-week spine derived from the day-first silver foundation and session-level runs.
    columns:
      - name: week_start_date
        description: First date of the completed calendar week.
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('silver_dates')
                field: week_start_date
      - name: week_end_date
        tests:
          - not_null
      - name: is_completed_week
        tests:
          - not_null
      - name: runs_per_week
        tests:
          - not_null
      - name: weekly_distance_km
        tests:
          - not_null
      - name: active_week_flag
        tests:
          - not_null
      - name: missed_week_flag
        tests:
          - not_null

  - name: mart_days
    description: Primary daily training mart with run outcomes, health context, active-day flags, and rolling daily windows.
    columns:
      - name: calendar_date
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('silver_dates')
                field: calendar_date
      - name: run_count
        tests:
          - not_null
      - name: distance_km
        tests:
          - not_null
      - name: duration_seconds
        tests:
          - not_null
      - name: active_day_flag
        tests:
          - not_null

  - name: mart_weeks
    description: Weekly rollup derived from mart_days, preserving completed-week consistency and volume outputs.
    columns:
      - name: week_start_date
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('silver_dates')
                field: week_start_date
      - name: week_end_date
        tests:
          - not_null
      - name: runs_per_week
        tests:
          - not_null
      - name: weekly_distance_km
        tests:
          - not_null
      - name: active_week_flag
        tests:
          - not_null
      - name: completed_day_count
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [7]

  - name: mart_months
    description: Calendar-month rollup derived strictly from mart_days.
    columns:
      - name: month_start_date
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('silver_dates')
                field: month_start_date
      - name: monthly_distance_km
        tests:
          - not_null

  - name: mart_years
    description: Calendar-year rollup derived strictly from mart_days.
    columns:
      - name: year_start_date
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('silver_dates')
                field: year_start_date
      - name: yearly_distance_km
        tests:
          - not_null

  - name: signal_consistency
    description: Weekly consistency compatibility signal sourced from the day-derived mart_weeks model.
    columns:
      - name: week_start_date
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('mart_weeks')
                field: week_start_date

  - name: signal_volume
    description: Weekly volume compatibility signal sourced from the day-derived mart_weeks model.
    columns:
      - name: week_start_date
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('mart_weeks')
                field: week_start_date

  - name: signal_fitness
    description: Run-level fitness indicators based on pace, heart rate, derived efficiency, and same-day Garmin health context.
    columns:
      - name: activity_id
        description: Garmin activity identifier.
        tests:
          - not_null
          - unique
      - name: activity_date
        description: Run calendar date.
        tests:
          - not_null
      - name: hr_drift_pct
        description: Run-level heart-rate drift, calculated as second-half segment efficiency divided by first-half segment efficiency minus one.
      - name: rolling_4_run_hr_drift_pct
        description: Rolling four-run average of heart-rate drift.

  - name: mart_runs
    description: Compatibility presentation-ready run-level metrics with same-day health context.
    columns:
      - name: activity_id
        tests:
          - not_null
          - unique

  - name: mart_running_signals
    description: Compatibility run-level signal mart with day-derived weekly training context.
    columns:
      - name: activity_id
        tests:
          - not_null
          - unique

  - name: mart_weekly_training_features
    description: Compatibility prediction-ready weekly feature and label table derived from mart_weeks.
    columns:
      - name: week_start_date
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('mart_weeks')
                field: week_start_date

  - name: mart_run_segments
    description: Fixed 250m route and performance segments derived from silver_run_records.
    tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns: ["run_id", "segment_index"]
    columns:
      - name: run_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('silver_runs')
                field: run_id
      - name: segment_index
        tests:
          - not_null
      - name: segment_start_timestamp
        tests:
          - not_null
      - name: representative_h3_cell_resolution_8
        description: Resolution-8 H3 cell used for route similarity matching.

  - name: mart_route_clusters
    description: One row per GPS-backed run with similarity-based, direction-specific route identity.
    columns:
      - name: run_id
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('silver_runs')
                field: run_id
      - name: route_id
        description: Stable route cluster identifier derived from the representative route signature and distance bucket.
        tests:
          - not_null
      - name: route_representative_run_id
        description: Earliest observed run in the route cluster.
        tests:
          - not_null
      - name: route_match_similarity
        description: Best route similarity score used to explain the run's cluster assignment.
        tests:
          - not_null
      - name: route_distance_bucket_km
        description: Representative route distance rounded to the nearest 0.5 km.
        tests:
          - not_null

  - name: mart_run_sessions
    description: One row per run with session outcomes, daily context, route identity, route summary, and recent training context.
    columns:
      - name: run_id
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('silver_runs')
                field: run_id
      - name: activity_id
        tests:
          - not_null
      - name: activity_date
        tests:
          - not_null
      - name: route_id
        description: Similarity-based route cluster identifier when GPS-backed route geometry exists.
      - name: route_representative_run_id
        description: Earliest observed run for the assigned route cluster.
      - name: route_match_similarity
        description: Best route similarity score used to assign the run to its route cluster.

  - name: mart_routes
    description: One row per detected route profile with aggregate historical session outcomes and route characteristics.
    columns:
      - name: route_id
        tests:
          - not_null
          - unique

  - name: mart_route_prediction_features
    description: One row per run-route observation with route features, recent training context, prior route context, and outcome labels.
    columns:
      - name: run_id
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('mart_run_sessions')
                field: run_id
      - name: route_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('mart_routes')
                field: route_id
      - name: label_avg_pace_min_per_km
        description: Outcome label for descriptive prediction-readiness experiments.
